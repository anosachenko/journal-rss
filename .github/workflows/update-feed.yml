name: Post new MR PORTER Journal articles to Telegram

on:
  schedule:
    - cron: "0 6 * * *"    # 09:00 Moscow time (MSK = UTC+3, no DST)
    - cron: "0 18 * * *"   # 21:00 Moscow time
  workflow_dispatch: {}       # allows manual "Run workflow" button too

permissions:
  contents: write

jobs:
  update-feed:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scraper / Telegram poster
        env:
          SCRAPERAPI_KEY: ${{ secrets.SCRAPERAPI_KEY }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u update_feed.py

      - name: Commit updated dedup state if changed
        run: |
          git config user.name "feed-bot"
          git config user.email "feed-bot@users.noreply.github.com"
          git add seen_articles.json 2>/dev/null || true
          git diff --cached --quiet || git commit -m "Update seen articles [skip ci]"
          git push
